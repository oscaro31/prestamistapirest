<div class="container-fluid py-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0" data-i18n="plan_cuentas"><i class="bi bi-book"></i> Plan de Cuentas</h4>
    <div>
      <div class="input-group input-group-sm me-2 d-inline-flex" style="width:250px">
        <input type="text" class="form-control" id="pcBuscar" placeholder="Buscar cuenta..." oninput="filtrarPlanCuentas()">
        <button class="btn btn-outline-secondary" onclick="filtrarPlanCuentas()"><i class="bi bi-search"></i></button>
      </div>
      <button class="btn btn-primary btn-sm" onclick="nuevaCuenta()" data-i18n="nueva_cuenta"><i class="bi bi-plus-lg"></i> Nueva Cuenta</button>
    </div>
  </div>
  <div class="card"><div class="card-body p-0" id="pcTree" style="max-height:70vh;overflow-y:auto"></div></div>
</div>
<div class="modal fade" id="modalCuenta" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content">
  <div class="modal-header" style="background:linear-gradient(135deg,#1a1a2e,#0f3460);color:white">
    <h5 class="modal-title" id="mcuTitulo"><i class="bi bi-journal-text"></i> <span data-i18n="cuenta">Cuenta</span></h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
  </div>
  <div class="modal-body">
    <div class="row g-3">
      <div class="col-4"><label class="form-label fw-bold" data-i18n="codigo">Codigo</label><input class="form-control" id="mcuCodigo" placeholder="1.1.06"></div>
      <div class="col-8"><label class="form-label fw-bold" data-i18n="nombre">Nombre</label><input class="form-control" id="mcuNombre" placeholder="Nombre"></div>
    </div>
    <div class="row g-3 mt-1">
      <div class="col-4"><label class="form-label fw-bold" data-i18n="tipo">Tipo</label>
        <select class="form-select" id="mcuTipo">
          <option value="">Sel...</option>
          <option value="Activo">Activo</option>
          <option value="Pasivo">Pasivo</option>
          <option value="Capital">Capital</option>
          <option value="Ingreso">Ingreso</option>
          <option value="Gasto">Gasto</option>
        </select>
      </div>
      <div class="col-4"><label class="form-label fw-bold" data-i18n="naturaleza">Naturaleza</label>
        <select class="form-select" id="mcuNaturaleza">
          <option value="Debe">Debe</option>
          <option value="Haber">Haber</option>
        </select>
      </div>
      <div class="col-4"><label class="form-label fw-bold" data-i18n="nivel">Nivel</label>
        <input type="number" class="form-control" id="mcuNivel" value="3" min="1" max="5">
      </div>
    </div>
    <div class="mb-3 mt-2"><label class="form-label fw-bold" data-i18n="cuenta_padre">Cuenta Padre</label>
      <select class="form-select" id="mcuPadre"><option value="">Ninguna (Raiz)</option></select>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="cancelar"><i class="bi bi-x-lg"></i></button>
    <button class="btn btn-primary" onclick="guardarCuenta()" data-i18n="guardar"><i class="bi bi-save"></i></button>
  </div>
</div></div></div>
